<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f7f3ea">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="初期費用計算">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icon-180.png">
  <title>賃貸初期費用計算</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1f2933;
      --muted: #687381;
      --line: #d4dbe3;
      --paper: #ffffff;
      --base: #eef2f5;
      --field: #ffffff;
      --accent: #0f766e;
      --accent-2: #b45309;
      --good: #166534;
      --danger: #b91c1c;
      --shadow: 0 10px 24px rgba(38, 50, 56, .10);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "YuGothic", "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--base);
      min-height: 100svh;
    }

    button, input, select, textarea {
      font: inherit;
    }

    .app {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: calc(14px + env(safe-area-inset-top)) 14px calc(24px + env(safe-area-inset-bottom));
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      padding: 4px 2px 14px;
    }

    h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .total-chip {
      min-width: 128px;
      padding: 10px 12px;
      border: 1px solid rgba(15, 118, 110, .25);
      border-radius: 8px;
      background: rgba(255, 255, 255, .72);
      text-align: right;
      box-shadow: 0 6px 18px rgba(15, 118, 110, .08);
    }

    .total-chip span {
      display: block;
      color: var(--muted);
      font-size: 11px;
    }

    .total-chip strong {
      display: block;
      margin-top: 2px;
      color: var(--accent);
      font-size: 20px;
      white-space: nowrap;
    }

    main {
      display: grid;
      gap: 12px;
    }

    section {
      background: rgba(255, 255, 255, .92);
      border: 1px solid rgba(217, 224, 232, .8);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .62);
    }

    h2 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0;
    }

    .section-total {
      color: var(--accent);
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
    }

    .fields {
      display: grid;
      gap: 10px;
      padding: 12px;
    }

    .grid-2 {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr 1fr;
    }

    .grid-3 {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr 1fr 1fr;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    input, select, textarea {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--field);
      color: var(--ink);
      padding: 10px 11px;
      outline: none;
      appearance: none;
    }

    textarea {
      min-height: 74px;
      resize: vertical;
      line-height: 1.5;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, .14);
    }

      .line-item {
      display: grid;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .72);
    }

    .line-item.is-muted {
      opacity: .58;
      background: #f7f9fb;
    }

    .line-title {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      font-size: 13px;
      font-weight: 700;
    }

    .line-title output {
      color: var(--accent);
      font-weight: 800;
      white-space: nowrap;
    }

    .reference-note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .mode-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .mode-row.compact {
      grid-template-columns: 1fr 1fr;
    }

    [hidden] {
      display: none !important;
    }

    .toggle {
      display: flex;
      align-items: center;
      gap: 9px;
      min-height: 44px;
      color: var(--ink);
      font-size: 13px;
      padding: 0 2px;
    }

    .toggle input {
      width: 22px;
      height: 22px;
      min-height: 22px;
      accent-color: var(--accent);
    }

    .actions {
      position: sticky;
      bottom: 0;
      z-index: 5;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
      padding: 12px 0 0;
      background: linear-gradient(transparent, var(--base) 28%);
    }

    .actions button, .ghost-button {
      min-height: 48px;
      border: 0;
      border-radius: 8px;
      padding: 11px 12px;
      color: #fff;
      background: var(--accent);
      font-weight: 800;
      box-shadow: 0 9px 22px rgba(15, 118, 110, .22);
    }

    .actions button.secondary, .ghost-button {
      background: #3c4654;
      box-shadow: 0 9px 22px rgba(60, 70, 84, .18);
    }

    .small-action {
      display: flex;
      justify-content: flex-end;
      padding: 0 12px 12px;
    }

    .ghost-button {
      min-height: 38px;
      padding: 8px 10px;
      font-size: 12px;
      box-shadow: none;
    }

    #shareCard {
      position: fixed;
      left: -9999px;
      top: 0;
      width: 760px;
      background: var(--paper);
      color: var(--ink);
      padding: 34px;
    }

    .toast {
      position: fixed;
      left: 14px;
      right: 14px;
      bottom: calc(74px + env(safe-area-inset-bottom));
      transform: translateY(18px);
      opacity: 0;
      pointer-events: none;
      transition: .2s ease;
      border-radius: 8px;
      padding: 12px 14px;
      background: rgba(31, 41, 51, .94);
      color: #fff;
      font-size: 13px;
      text-align: center;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .preview-sheet {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      padding: calc(18px + env(safe-area-inset-top)) 14px calc(18px + env(safe-area-inset-bottom));
      background: rgba(31, 41, 51, .68);
      overflow: auto;
    }

    .preview-sheet.show {
      display: block;
    }

    .preview-panel {
      width: min(100%, 620px);
      margin: 0 auto;
      border-radius: 8px;
      background: #fff;
      padding: 12px;
      box-shadow: 0 18px 46px rgba(0, 0, 0, .24);
    }

    .preview-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .preview-actions a,
    .preview-actions button {
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-weight: 800;
      text-align: center;
      text-decoration: none;
      padding: 11px 10px;
    }

    .preview-actions button {
      background: #3c4654;
    }

    .preview-panel img {
      display: block;
      width: 100%;
      height: auto;
      border: 1px solid var(--line);
    }

    @media (max-width: 560px) {
      header { align-items: stretch; }
      h1 { font-size: 23px; }
      .total-chip { min-width: 116px; }
      .grid-2, .grid-3, .mode-row { grid-template-columns: 1fr; }
      .actions { grid-template-columns: 1fr; }
    }

    @media print {
      body { background: #fff; }
      .app > header, .app > main, .actions, .toast { display: none; }
      #shareCard {
        position: static;
        width: auto;
        padding: 0;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>賃貸初期費用計算</h1>
        <p class="subtitle">店頭・内見先で概算を作り、画像またはPDFでそのまま共有できます。</p>
      </div>
      <div class="total-chip">
        <span>概算合計</span>
        <strong id="grandTotalTop">0円</strong>
      </div>
    </header>

    <main>
      <section>
        <div class="section-head">
          <h2>物件・賃料</h2>
          <strong class="section-total" id="rentBaseTotal">0円/月</strong>
        </div>
        <div class="fields">
          <div class="grid-2">
            <label>物件名
              <input id="propertyName" placeholder="例: サンプルマンション">
            </label>
            <label>号室
              <input id="roomNumber" placeholder="例: 203">
            </label>
          </div>
          <div class="grid-2">
            <label>お客様名
              <input id="customerName" placeholder="例: 山田様">
            </label>
            <label>契約開始日
              <input id="contractStartDate" type="date">
            </label>
          </div>
          <div class="grid-2">
            <label>賃料
              <input id="rent" type="number" inputmode="numeric" min="0" placeholder="120000">
            </label>
            <label>管理費・共益費
              <input id="management" type="number" inputmode="numeric" min="0" placeholder="10000">
            </label>
          </div>
        </div>
      </section>

      <section>
        <div class="section-head">
          <h2>契約時費用</h2>
          <strong class="section-total" id="contractTotal">0円</strong>
        </div>
        <div class="fields" id="contractItems"></div>
      </section>

      <section>
        <div class="section-head">
          <h2>前賃料</h2>
          <strong class="section-total" id="advanceTotal">0円</strong>
        </div>
        <div class="fields">
          <div class="line-item">
            <div class="line-title">当月日割賃料・管理費 <output id="proratedOutput">0円</output></div>
            <div class="grid-3">
              <label>対象日数
                <input id="currentChargeDays" readonly value="0日">
              </label>
              <label>無料日数
                <input id="currentFreeDays" readonly value="0日">
              </label>
              <label>月の日数
                <input id="daysInMonth" readonly value="0日">
              </label>
            </div>
          </div>
          <div class="line-item">
            <div class="line-title">翌月分賃料・管理費 <output id="nextMonthOutput">0円</output></div>
            <div class="reference-note" id="nextMonthNote"></div>
            <label class="toggle">
              <input id="includeNextMonth" type="checkbox" checked>
              請求に含める
            </label>
          </div>
          <div class="line-item">
            <div class="line-title">翌々月分賃料・管理費 <output id="monthAfterOutput">0円</output></div>
            <div class="reference-note" id="monthAfterNote"></div>
            <label class="toggle">
              <input id="includeMonthAfter" type="checkbox">
              請求に含める
            </label>
          </div>
          <div class="line-item">
            <div class="line-title">フリーレント控除 <output id="freeRentOutput">0円</output></div>
            <div class="grid-3">
              <label>指定方法
                <select id="freeRentMode">
                  <option value="months">ヶ月</option>
                  <option value="days">日数</option>
                </select>
              </label>
              <label id="freeRentMonthsField">無料ヶ月
                <input id="freeRentMonths" type="number" inputmode="decimal" min="0" step="0.5" value="0">
              </label>
              <label id="freeRentDaysField" hidden>無料日数
                <input id="freeRentDays" type="number" inputmode="numeric" min="0" value="0">
              </label>
              <label class="toggle">
                <input id="freeRentIncludesManagement" type="checkbox">
                管理費も無料対象に含める
              </label>
            </div>
          </div>
        </div>
      </section>

      <section>
        <div class="section-head">
          <h2>追加費用・メモ</h2>
          <strong class="section-total" id="extraTotal">0円</strong>
        </div>
        <div class="fields" id="extraItems"></div>
        <div class="small-action">
          <button class="ghost-button" id="addExtra" type="button">追加行</button>
        </div>
        <div class="fields" style="padding-top:0">
          <label>お客様向けメモ
            <textarea id="memo" placeholder="例: 火災保険・保証会社は審査内容により変動する場合があります。"></textarea>
          </label>
        </div>
      </section>
    </main>

    <div class="actions">
      <button id="shareImage" type="button">画像で共有</button>
      <button class="secondary" id="printPdf" type="button">PDF保存/共有</button>
    </div>
  </div>

  <div id="shareCard"></div>
  <div class="toast" id="toast"></div>
  <div class="preview-sheet" id="imagePreview">
    <div class="preview-panel">
      <div class="preview-actions">
        <a id="previewDownload" href="#" download="賃貸初期費用概算.png">画像を保存</a>
        <button id="closePreview" type="button">閉じる</button>
      </div>
      <img id="previewImage" alt="賃貸初期費用概算画像">
    </div>
  </div>

  <script>
    const byId = (id) => document.getElementById(id);
    const money = (value) => Math.max(0, Math.round(Number(value) || 0));
    const fmt = (value) => {
      const amount = Math.round(Number(value) || 0);
      return `${amount < 0 ? "-" : ""}${new Intl.NumberFormat("ja-JP").format(Math.abs(amount))}円`;
    };
    const rent = () => money(byId("rent").value);
    const management = () => money(byId("management").value);
    const monthly = () => rent() + management();

    const contractDefs = [
      { id: "deposit", label: "敷金", type: "rentMonthOrAmount", mode: "month", value: "1" },
      { id: "keyMoney", label: "礼金", type: "rentMonthOrAmount", mode: "month", value: "1" },
      { id: "brokerage", label: "仲介手数料", type: "brokerage", value: "1.1" },
      { id: "guarantee", label: "初回保証料", type: "monthlyPercentOrAmount", mode: "percent", value: "50" },
      { id: "keyExchange", label: "鍵交換代", type: "amountOnly", value: "" },
      { id: "fireInsurance", label: "火災保険料", type: "amountOnly", value: "" }
    ];
    const extraDefaults = [];

    function makeLineItem(def) {
      const { id, label, type, mode = "amount", value = "" } = def;
      const wrap = document.createElement("div");
      wrap.className = "line-item";
      wrap.dataset.id = id;
      if (type === "rentMonthOrAmount") {
        wrap.innerHTML = `
          <div class="line-title">${label}<output id="${id}Output">0円</output></div>
          <div class="mode-row compact">
            <label>計算方法
              <select id="${id}Mode">
                <option value="month">月数</option>
                <option value="amount">金額指定</option>
              </select>
            </label>
            <label id="${id}MonthField">賃料の月数
              <input id="${id}MonthValue" type="number" inputmode="decimal" min="0" step="0.01">
            </label>
            <label id="${id}AmountField" hidden>金額
              <input id="${id}AmountValue" type="number" inputmode="numeric" min="0">
            </label>
          </div>`;
        wrap.querySelector(`#${id}Mode`).value = mode;
        wrap.querySelector(`#${id}MonthValue`).value = mode === "month" ? value : "";
        wrap.querySelector(`#${id}AmountValue`).value = mode === "amount" ? value : "";
      } else if (type === "brokerage") {
        wrap.innerHTML = `
          <div class="line-title">${label}<output id="${id}Output">0円</output></div>
          <div class="mode-row compact">
            <label>賃料に対する倍率
              <select id="${id}Multiplier">
                <option value="1.1">1.1ヶ月</option>
                <option value="1">1ヶ月</option>
                <option value="0.55">0.55ヶ月</option>
                <option value="0.5">0.5ヶ月</option>
                <option value="0">なし</option>
                <option value="custom">手入力</option>
              </select>
            </label>
            <label id="${id}CustomField" hidden>手入力倍率
              <input id="${id}CustomMultiplier" type="number" inputmode="decimal" min="0" step="0.01" value="1.1">
            </label>
          </div>`;
        wrap.querySelector(`#${id}Multiplier`).value = value;
      } else if (type === "monthlyPercentOrAmount") {
        wrap.innerHTML = `
          <div class="line-title">${label}<output id="${id}Output">0円</output></div>
          <div class="mode-row compact">
            <label>計算方法
              <select id="${id}Mode">
                <option value="percent">月額総額%</option>
                <option value="amount">金額指定</option>
              </select>
            </label>
            <label id="${id}PercentField">月額総額に対する%
              <input id="${id}PercentValue" type="number" inputmode="decimal" min="0" step="1">
            </label>
            <label id="${id}AmountField" hidden>金額
              <input id="${id}AmountValue" type="number" inputmode="numeric" min="0">
            </label>
          </div>`;
        wrap.querySelector(`#${id}Mode`).value = mode;
        wrap.querySelector(`#${id}PercentValue`).value = mode === "percent" ? value : "";
        wrap.querySelector(`#${id}AmountValue`).value = mode === "amount" ? value : "";
      } else {
        const detailField = id === "fireInsurance" ? `
          <label>契約年数
            <input id="${id}Years" type="number" inputmode="decimal" min="0" step="0.5" placeholder="例: 2">
          </label>` : "";
        wrap.innerHTML = `
          <div class="line-title">${label}<output id="${id}Output">0円</output></div>
          <div class="${detailField ? "grid-2" : ""}">
            <label>金額
              <input id="${id}AmountValue" type="number" inputmode="numeric" min="0" value="${value}" placeholder="0">
            </label>
            ${detailField}
          </div>`;
      }
      return wrap;
    }

    function makeExtraItem(index, label = "", value = "") {
      const id = `extra${index}`;
      const wrap = document.createElement("div");
      wrap.className = "line-item";
      wrap.dataset.extra = id;
      wrap.innerHTML = `
        <div class="line-title">追加費用 <output id="${id}Output">0円</output></div>
        <div class="grid-2">
          <label>項目名
            <input id="${id}Name" value="${label}" placeholder="例: 室内清掃費">
          </label>
          <label>金額
            <input id="${id}Value" type="number" inputmode="numeric" min="0" value="${value}" placeholder="0">
          </label>
        </div>`;
      return wrap;
    }

    function lineAmount(id) {
      const def = contractDefs.find((item) => item.id === id);
      if (!def) return 0;
      if (def.type === "rentMonthOrAmount") {
        const mode = byId(`${id}Mode`).value;
        return mode === "month" ? money(rent() * (Number(byId(`${id}MonthValue`).value) || 0)) : money(byId(`${id}AmountValue`).value);
      }
      if (def.type === "brokerage") {
        const selected = byId(`${id}Multiplier`).value;
        const multiplier = selected === "custom" ? Number(byId(`${id}CustomMultiplier`).value) || 0 : Number(selected) || 0;
        return money(rent() * multiplier);
      }
      if (def.type === "monthlyPercentOrAmount") {
        const mode = byId(`${id}Mode`).value;
        return mode === "percent" ? money(monthly() * (Number(byId(`${id}PercentValue`).value) || 0) / 100) : money(byId(`${id}AmountValue`).value);
      }
      return money(byId(`${id}AmountValue`).value);
    }

    function parseLocalDate(value) {
      if (!value) return null;
      const [year, month, day] = value.split("-").map(Number);
      return new Date(year, month - 1, day);
    }

    function addDays(date, days) {
      const next = new Date(date);
      next.setDate(next.getDate() + days);
      return next;
    }

    function daysIn(date) {
      return new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
    }

    function monthLabel(date) {
      return `${date.getFullYear()}年${date.getMonth() + 1}月`;
    }

    function freeRentDays(start) {
      if (!start) return 0;
      if (byId("freeRentMode").value === "months") {
        return Math.round((Number(byId("freeRentMonths").value) || 0) * daysIn(start));
      }
      return Math.max(0, Number(byId("freeRentDays").value) || 0);
    }

    function chargeForPeriod(start, end, freeEnd) {
      if (!start || !end || end < start) {
        return { amount: 0, gross: 0, free: 0, charged: 0, days: 0, label: "" };
      }
      const freeMgmt = byId("freeRentIncludesManagement").checked;
      let gross = 0;
      let charged = 0;
      let free = 0;
      for (let day = new Date(start); day <= end; day = addDays(day, 1)) {
        const dailyRent = rent() / daysIn(day);
        const dailyManagement = management() / daysIn(day);
        gross += dailyRent + dailyManagement;
        const isFree = freeEnd && day < freeEnd;
        if (isFree) {
          free += dailyRent + (freeMgmt ? dailyManagement : 0);
          charged += freeMgmt ? 0 : dailyManagement;
        } else {
          charged += dailyRent + dailyManagement;
        }
      }
      return {
        amount: money(charged),
        gross: money(gross),
        free: money(free),
        charged: money(charged),
        days: Math.round((end - start) / 86400000) + 1,
        label: monthLabel(start)
      };
    }

    function advanceRentBreakdown() {
      const start = parseLocalDate(byId("contractStartDate").value);
      if (!start) {
        return {
          current: { amount: 0, gross: 0, free: 0, charged: 0, days: 0, label: "" },
          next: { amount: 0, referenceAmount: 0, included: true, gross: 0, free: 0, charged: 0, days: 0, label: "" },
          monthAfter: { amount: 0, referenceAmount: 0, included: false, gross: 0, free: 0, charged: 0, days: 0, label: "" },
          freeTotal: 0
        };
      }
      const freeDays = freeRentDays(start);
      const freeEnd = freeDays > 0 ? addDays(start, freeDays) : null;
      const currentEnd = new Date(start.getFullYear(), start.getMonth() + 1, 0);
      const nextStart = new Date(start.getFullYear(), start.getMonth() + 1, 1);
      const nextEnd = new Date(start.getFullYear(), start.getMonth() + 2, 0);
      const afterStart = new Date(start.getFullYear(), start.getMonth() + 2, 1);
      const afterEnd = new Date(start.getFullYear(), start.getMonth() + 3, 0);
      const current = chargeForPeriod(start, currentEnd, freeEnd);
      const nextCalc = chargeForPeriod(nextStart, nextEnd, freeEnd);
      const monthAfterCalc = chargeForPeriod(afterStart, afterEnd, freeEnd);
      const nextIncluded = byId("includeNextMonth").checked;
      const monthAfterIncluded = byId("includeMonthAfter").checked;
      const next = { ...nextCalc, included: nextIncluded, referenceAmount: nextCalc.amount, amount: nextIncluded ? nextCalc.amount : 0 };
      const monthAfter = { ...monthAfterCalc, included: monthAfterIncluded, referenceAmount: monthAfterCalc.amount, amount: monthAfterIncluded ? monthAfterCalc.amount : 0 };
      return {
        current,
        next,
        monthAfter,
        freeTotal: current.free + (nextIncluded ? nextCalc.free : 0) + (monthAfterIncluded ? monthAfterCalc.free : 0)
      };
    }

    function extraRows() {
      return Array.from(document.querySelectorAll("[data-extra]"));
    }

    function setHidden(id, hidden) {
      const el = byId(id);
      if (el) el.hidden = hidden;
    }

    function syncUiState() {
      contractDefs.forEach((def) => {
        if (def.type === "rentMonthOrAmount") {
          const mode = byId(`${def.id}Mode`).value;
          setHidden(`${def.id}MonthField`, mode !== "month");
          setHidden(`${def.id}AmountField`, mode !== "amount");
        }
        if (def.type === "brokerage") {
          setHidden(`${def.id}CustomField`, byId(`${def.id}Multiplier`).value !== "custom");
        }
        if (def.type === "monthlyPercentOrAmount") {
          const mode = byId(`${def.id}Mode`).value;
          setHidden(`${def.id}PercentField`, mode !== "percent");
          setHidden(`${def.id}AmountField`, mode !== "amount");
        }
      });
      setHidden("freeRentMonthsField", byId("freeRentMode").value !== "months");
      setHidden("freeRentDaysField", byId("freeRentMode").value !== "days");
      byId("includeNextMonth").closest(".line-item").classList.toggle("is-muted", !byId("includeNextMonth").checked);
      byId("includeMonthAfter").closest(".line-item").classList.toggle("is-muted", !byId("includeMonthAfter").checked);
    }

    function calculate() {
      syncUiState();
      byId("rentBaseTotal").textContent = `${fmt(monthly())}/月`;
      let contractTotal = 0;
      contractDefs.forEach((def) => {
        const amount = lineAmount(def.id);
        contractTotal += amount;
        byId(`${def.id}Output`).textContent = fmt(amount);
      });

      const advance = advanceRentBreakdown();
      byId("proratedOutput").textContent = fmt(advance.current.amount);
      byId("nextMonthOutput").textContent = advance.next.included ? fmt(advance.next.amount) : "対象外";
      byId("nextMonthNote").textContent = advance.next.included ? "" : `参考額: ${fmt(advance.next.referenceAmount)}`;
      byId("monthAfterOutput").textContent = advance.monthAfter.included ? fmt(advance.monthAfter.amount) : "対象外";
      byId("monthAfterNote").textContent = advance.monthAfter.included ? "" : `参考額: ${fmt(advance.monthAfter.referenceAmount)}`;
      byId("freeRentOutput").textContent = fmt(-advance.freeTotal);
      byId("currentChargeDays").value = `${advance.current.days}日`;
      const startDate = parseLocalDate(byId("contractStartDate").value);
      byId("currentFreeDays").value = `${Math.round(advance.current.free > 0 ? Math.min(freeRentDays(startDate), advance.current.days) : 0)}日`;
      byId("daysInMonth").value = startDate ? `${daysIn(startDate)}日` : "0日";
      const advanceTotal = advance.current.amount + advance.next.amount + advance.monthAfter.amount;

      let extraTotal = 0;
      extraRows().forEach((row) => {
        const id = row.dataset.extra;
        const amount = money(byId(`${id}Value`).value);
        extraTotal += amount;
        byId(`${id}Output`).textContent = fmt(amount);
      });

      const grand = contractTotal + advanceTotal + extraTotal;
      byId("contractTotal").textContent = fmt(contractTotal);
      byId("advanceTotal").textContent = fmt(advanceTotal);
      byId("extraTotal").textContent = fmt(extraTotal);
      byId("grandTotalTop").textContent = fmt(grand);
      return {
        contractTotal,
        advanceTotal,
        extraTotal,
        grand,
        proratedAmount: advance.current.amount,
        next: advance.next.amount,
        monthAfter: advance.monthAfter.amount,
        freeTotal: advance.freeTotal,
        advance
      };
    }

    function rowsForShare() {
      const totals = calculate();
      const rows = contractDefs.map((def) => [displayContractLabel(def), lineAmount(def.id)]);
      rows.push(
        ["当月日割賃料・管理費", totals.proratedAmount],
        ["翌月分賃料・管理費", totals.next],
        ["翌々月分賃料・管理費", totals.monthAfter]
      );
      if (totals.freeTotal > 0) rows.push(["フリーレント控除", -totals.freeTotal]);
      extraRows().forEach((row) => {
        const id = row.dataset.extra;
        const name = byId(`${id}Name`).value.trim() || "追加費用";
        rows.push([name, money(byId(`${id}Value`).value)]);
      });
      return rows.filter(([, amount]) => amount !== 0);
    }

    function displayContractLabel(def) {
      if (def.id === "fireInsurance") {
        const years = Number(byId("fireInsuranceYears")?.value) || 0;
        if (years > 0) return `${def.label}（${years}年）`;
      }
      return def.label;
    }

    function buildShareCard() {
      const totals = calculate();
      const property = displayProperty();
      const customer = byId("customerName").value.trim();
      const start = byId("contractStartDate").value;
      const memo = byId("memo").value.trim();
      const today = new Date().toLocaleDateString("ja-JP", { year: "numeric", month: "2-digit", day: "2-digit" });
      const rows = rowsForShare().map(([name, amount]) => `
        <tr>
          <td style="padding:10px 12px;border-bottom:1px solid #d4dbe3;font-size:17px;">${escapeHtml(name)}</td>
          <td style="padding:10px 12px;border-bottom:1px solid #d4dbe3;text-align:right;font-size:18px;font-weight:700;color:${amount < 0 ? "#b91c1c" : "#1f2933"};">${fmt(amount)}</td>
        </tr>`).join("");
      byId("shareCard").innerHTML = `
        <div style="border:1px solid #1f2933;padding:0;background:#fff;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;">
          <div style="display:flex;justify-content:space-between;gap:20px;align-items:flex-start;padding:24px 28px;background:#26313d;color:#fff;">
            <div>
              <div style="font-size:16px;opacity:.82;">賃貸初期費用 概算書</div>
              <h1 style="font-size:31px;margin:8px 0 0;line-height:1.25;">${escapeHtml(property)}</h1>
              <div style="font-size:16px;opacity:.88;margin-top:8px;">${escapeHtml([customer, start ? `契約開始 ${start}` : ""].filter(Boolean).join(" / "))}</div>
            </div>
            <div style="text-align:right;font-size:15px;opacity:.86;">作成日<br>${today}</div>
          </div>
          <div style="padding:22px 28px 28px;">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;">
              <div style="border:1px solid #d4dbe3;padding:14px 16px;background:#f7f9fb;">
                <div style="font-size:14px;color:#687381;">賃料+管理費</div>
                <strong style="display:block;margin-top:4px;font-size:24px;color:#1f2933;">${fmt(monthly())}/月</strong>
              </div>
              <div style="border:2px solid #0f766e;padding:13px 16px;background:#f0fdfa;">
                <div style="font-size:14px;color:#0f766e;">概算合計</div>
                <strong style="display:block;margin-top:4px;font-size:29px;color:#0f766e;">${fmt(totals.grand)}</strong>
              </div>
            </div>
            <table style="width:100%;border-collapse:collapse;border-top:2px solid #1f2933;">
              <thead>
                <tr>
                  <th style="padding:9px 12px;border-bottom:1px solid #1f2933;text-align:left;background:#eef2f5;font-size:14px;">項目</th>
                  <th style="padding:9px 12px;border-bottom:1px solid #1f2933;text-align:right;background:#eef2f5;font-size:14px;">金額</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
            ${memo ? `<p style="margin:18px 0 0;padding:12px 14px;border-left:4px solid #0f766e;background:#f7f9fb;font-size:15px;line-height:1.55;">${escapeHtml(memo).replace(/\n/g, "<br>")}</p>` : ""}
            <div style="display:flex;justify-content:space-between;gap:18px;margin-top:18px;padding-top:12px;border-top:1px solid #d4dbe3;color:#687381;font-size:13px;line-height:1.45;">
              <span>概算のため、審査内容・契約開始日・管理会社指定条件により変動する場合があります。</span>
              <span style="white-space:nowrap;">単位: 円</span>
            </div>
          </div>
        </div>`;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[char]));
    }

    function displayProperty() {
      const property = byId("propertyName").value.trim();
      const room = byId("roomNumber").value.trim();
      return [property || "物件名未入力", room].filter(Boolean).join(" ");
    }

    function makeCanvas() {
      buildShareCard();
      const rows = rowsForShare();
      const property = displayProperty();
      const customer = byId("customerName").value.trim();
      const start = byId("contractStartDate").value;
      const memo = byId("memo").value.trim();
      const totals = calculate();
      const canvas = document.createElement("canvas");
      const width = 1170;
      const rowHeight = 58;
      const memoHeight = memo ? 104 : 0;
      const height = 430 + rows.length * rowHeight + memoHeight;
      const scale = 2;
      canvas.width = width * scale;
      canvas.height = height * scale;
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;
      const ctx = canvas.getContext("2d");
      ctx.scale(scale, scale);
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, width, height);
      ctx.strokeStyle = "#1f2933";
      ctx.lineWidth = 2;
      ctx.strokeRect(34, 34, width - 68, height - 68);
      ctx.fillStyle = "#26313d";
      ctx.fillRect(34, 34, width - 68, 150);
      ctx.fillStyle = "#d9e0e8";
      ctx.font = "24px -apple-system, BlinkMacSystemFont, sans-serif";
      ctx.fillText("賃貸初期費用 概算書", 70, 82);
      ctx.textAlign = "right";
      ctx.font = "21px -apple-system, BlinkMacSystemFont, sans-serif";
      ctx.fillText("作成日", width - 70, 76);
      ctx.fillText(new Date().toLocaleDateString("ja-JP"), width - 70, 106);
      ctx.textAlign = "left";
      ctx.fillStyle = "#ffffff";
      ctx.font = "bold 42px -apple-system, BlinkMacSystemFont, sans-serif";
      wrapText(ctx, property, 70, 132, width - 250, 46, 2);
      ctx.fillStyle = "#d9e0e8";
      ctx.font = "23px -apple-system, BlinkMacSystemFont, sans-serif";
      ctx.fillText([customer, start ? `契約開始 ${start}` : ""].filter(Boolean).join(" / "), 70, 164);
      drawInfoBox(ctx, 70, 214, 490, "賃料+管理費", `${fmt(monthly())}/月`, "#1f2933", "#f7f9fb", "#d4dbe3");
      drawInfoBox(ctx, 610, 214, 490, "概算合計", fmt(totals.grand), "#0f766e", "#f0fdfa", "#0f766e");
      let y = 356;
      ctx.fillStyle = "#eef2f5";
      ctx.fillRect(70, y, width - 140, 44);
      ctx.strokeStyle = "#1f2933";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(70, y);
      ctx.lineTo(width - 70, y);
      ctx.moveTo(70, y + 44);
      ctx.lineTo(width - 70, y + 44);
      ctx.stroke();
      ctx.fillStyle = "#1f2933";
      ctx.font = "bold 22px -apple-system, BlinkMacSystemFont, sans-serif";
      ctx.textAlign = "left";
      ctx.fillText("項目", 88, y + 29);
      ctx.textAlign = "right";
      ctx.fillText("金額", width - 88, y + 29);
      y += 44;
      rows.forEach(([name, amount]) => {
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(70, y, width - 140, rowHeight);
        ctx.strokeStyle = "#d4dbe3";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(70, y + rowHeight);
        ctx.lineTo(width - 70, y + rowHeight);
        ctx.stroke();
        ctx.fillStyle = "#1f2933";
        ctx.font = "25px -apple-system, BlinkMacSystemFont, sans-serif";
        ctx.textAlign = "left";
        ctx.fillText(name, 88, y + 37);
        ctx.fillStyle = amount < 0 ? "#b91c1c" : "#1f2933";
        ctx.font = "bold 27px -apple-system, BlinkMacSystemFont, sans-serif";
        ctx.textAlign = "right";
        ctx.fillText(fmt(amount), width - 88, y + 37);
        y += rowHeight;
      });
      if (memo) {
        ctx.textAlign = "left";
        ctx.fillStyle = "#f7f9fb";
        ctx.fillRect(70, y + 18, width - 140, 72);
        ctx.fillStyle = "#0f766e";
        ctx.fillRect(70, y + 18, 8, 72);
        ctx.fillStyle = "#1f2933";
        ctx.font = "22px -apple-system, BlinkMacSystemFont, sans-serif";
        wrapText(ctx, memo, 94, y + 50, width - 188, 28, 2);
        y += memoHeight;
      }
      ctx.fillStyle = "#687381";
      ctx.font = "19px -apple-system, BlinkMacSystemFont, sans-serif";
      ctx.textAlign = "left";
      wrapText(ctx, "概算のため、審査内容・契約開始日・管理会社指定条件により変動する場合があります。", 70, height - 74, width - 220, 26, 2);
      ctx.textAlign = "right";
      ctx.fillText("単位: 円", width - 70, height - 74);
      return canvas;
    }

    function drawInfoBox(ctx, x, y, w, label, value, color, fill = "#ffffff", stroke = "#d9e0e8") {
      ctx.fillStyle = fill;
      ctx.strokeStyle = stroke;
      ctx.lineWidth = 2;
      ctx.fillRect(x, y, w, 104);
      ctx.strokeRect(x, y, w, 104);
      ctx.fillStyle = "#687381";
      ctx.font = "22px -apple-system, BlinkMacSystemFont, sans-serif";
      ctx.fillText(label, x + 24, y + 36);
      ctx.fillStyle = color;
      ctx.font = "bold 35px -apple-system, BlinkMacSystemFont, sans-serif";
      ctx.fillText(value, x + 24, y + 80);
    }

    function roundRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.arcTo(x + width, y, x + width, y + height, radius);
      ctx.arcTo(x + width, y + height, x, y + height, radius);
      ctx.arcTo(x, y + height, x, y, radius);
      ctx.arcTo(x, y, x + width, y, radius);
      ctx.closePath();
    }

    function wrapText(ctx, text, x, y, maxWidth, lineHeight, maxLines = 3) {
      const chars = String(text).split("");
      let line = "";
      let lines = 0;
      for (let i = 0; i < chars.length; i++) {
        const test = line + chars[i];
        if (ctx.measureText(test).width > maxWidth && line) {
          ctx.fillText(line, x, y);
          y += lineHeight;
          lines += 1;
          line = chars[i];
          if (lines >= maxLines - 1) break;
        } else {
          line = test;
        }
      }
      ctx.fillText(line, x, y);
    }

    function dataUrlToBlob(dataUrl) {
      const [meta, data] = dataUrl.split(",");
      const mime = meta.match(/:(.*?);/)?.[1] || "image/png";
      const binary = atob(data);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return new Blob([bytes], { type: mime });
    }

    async function shareImage() {
      const button = byId("shareImage");
      button.disabled = true;
      button.textContent = "作成中...";
      try {
        const canvas = makeCanvas();
        const dataUrl = canvas.toDataURL("image/png");
        const blob = dataUrlToBlob(dataUrl);
        const file = new File([blob], "賃貸初期費用概算.png", { type: "image/png" });

        if (navigator.canShare && navigator.canShare({ files: [file] }) && navigator.share) {
          try {
            await navigator.share({ files: [file], title: "賃貸初期費用概算" });
            showToast("共有メニューを開きました。");
            return;
          } catch (error) {
            if (error.name === "AbortError") return;
          }
        }

        showImagePreview(dataUrl, file.name);
        showToast("共有が使えない環境なので画像プレビューを表示しました。");
      } catch (error) {
        showToast(`画像作成に失敗しました: ${error.message}`);
      } finally {
        button.disabled = false;
        button.textContent = "画像で共有";
      }
    }

    function showImagePreview(dataUrl, filename) {
      byId("previewImage").src = dataUrl;
      byId("previewDownload").href = dataUrl;
      byId("previewDownload").download = filename;
      byId("imagePreview").classList.add("show");
    }

    function printPdf() {
      buildShareCard();
      window.print();
    }

    function showToast(message) {
      const toast = byId("toast");
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 3000);
    }

    contractDefs.forEach((def) => byId("contractItems").appendChild(makeLineItem(def)));
    extraDefaults.forEach(([label, value], index) => byId("extraItems").appendChild(makeExtraItem(index, label, value)));
    byId("addExtra").addEventListener("click", () => {
      byId("extraItems").appendChild(makeExtraItem(extraRows().length, "", ""));
      calculate();
    });
    byId("shareImage").addEventListener("click", shareImage);
    byId("printPdf").addEventListener("click", printPdf);
    byId("closePreview").addEventListener("click", () => byId("imagePreview").classList.remove("show"));
    document.addEventListener("input", calculate);
    document.addEventListener("change", calculate);
    if ("serviceWorker" in navigator && location.protocol !== "file:") {
      navigator.serviceWorker.register("./service-worker.js").catch(() => {});
    }
    calculate();
  </script>
</body>
</html>
